<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>輕便分帳</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="icon" href="./icon.png">
  <meta name="theme-color" content="#E9E9E7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="輕便分帳">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <style>
    :root {
      --bg: #E9E9E7;
      --panel: #F4F4F2;
      --ink: #111111;
      --muted: #7A7A77;
      --light: #929292;
      --line: #D5D5D1;
      --line-strong: #C6C6C1;
      --cloud: #E4E4E0;
      --paper: #ffffff;
      --accent: #111111;
      --accent-dark: #000000;
      --success: #6f846f;
      --danger: #c2413a;
      --shadow: 0 18px 44px rgba(39, 36, 30, .12);
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      background: var(--bg);
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }
    body.modal-open { overflow: hidden; }

    button, input, textarea, select { font: inherit; }
    button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

    .view {
      display: none;
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px 18px 108px;
    }
    .view.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      margin: -20px -18px 18px;
      padding: 10px 18px;
      background: rgba(244, 244, 242, .94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 0;
      box-shadow: 0 8px 24px rgba(17, 17, 17, .055);
    }

    .title {
      flex: 1;
      min-width: 0;
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: var(--radius);
      background: #E2E2DE;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn svg { width: 20px; height: 20px; stroke-width: 2px; }

    .btn {
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: none;
    }
    .btn:hover, .icon-btn:hover { background: var(--accent-dark); color: #fff; }
    .btn:active, .icon-btn:active, .chip:active { transform: translateY(1px); }
    .btn.secondary {
      background: #DCDCD8;
      color: var(--ink);
      border: 0;
      box-shadow: none;
    }
    .btn.danger {
      background: var(--danger);
      color: #fff;
      border: 0;
    }
    .btn.danger:hover {
      background: #a8322c;
    }

    .btn[disabled] {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn[disabled]:hover {
      background: var(--accent);
      color: #fff;
    }

    .hero {
      border-radius: var(--radius);
      padding: 16px;
      background: var(--panel);
      border: 0;
      box-shadow: none;
      animation: rise 0.35s ease both;
    }
    .hero-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .hero-amount {
      margin: 0;
      font-size: clamp(32px, 11vw, 48px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 850;
    }
    .hero-sub {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .summary-card {
      padding: 16px;
      border-radius: var(--radius);
      background: #fff;
      border: 0;
    }
    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .summary-card strong {
      font-size: 20px;
      letter-spacing: 0;
    }
    .positive { color: var(--success); }
    .negative { color: var(--accent); }

    .section-title {
      margin: 24px 4px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .group-card, .expense-card, .settle-card, .member-row {
      border-radius: var(--radius);
      background: var(--panel);
      border: 0;
      box-shadow: none;
      animation: rise 0.28s ease both;
    }

    .group-card {
      padding: 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }
    .group-dot {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      background: #E2E2DE;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 850;
      flex: 0 0 auto;
    }
    .group-main { flex: 1; min-width: 0; }
    .group-main h3 { margin: 0 0 5px; font-size: 17px; }
    .group-main p { margin: 0; color: var(--muted); font-size: 13px; }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
      padding: 4px;
      border-radius: var(--radius);
      background: #E4E4E0;
      border: 0;
    }
    .tab {
      border: 0;
      border-radius: var(--radius);
      min-height: 42px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active {
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .member-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      scrollbar-width: none;
    }
    .member-strip::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px 7px 7px;
      border-radius: var(--radius);
      background: #F8F8F6;
      border: 0;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #E2E2DE;
      object-fit: cover;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .expense-card {
      padding: 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .expense-card h3 { margin: 0 0 7px; font-size: 16px; }
    .expense-card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .expense-amount { font-size: 19px; font-weight: 850; white-space: nowrap; }
    .delete-mini {
      justify-self: end;
      align-self: end;
      border: 0;
      background: transparent;
      color: var(--light);
      padding: 5px;
      cursor: pointer;
    }

    .empty {
      padding: 42px 22px;
      border: 0;
      border-radius: var(--radius);
      background: #DEDEDA;
      text-align: center;
      color: var(--muted);
    }
    .empty h3 { margin: 0 0 8px; color: var(--ink); font-size: 17px; }
    .empty p { margin: 0; line-height: 1.55; font-size: 14px; }

    .settle-card {
      padding: 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .settle-person { min-width: 0; }
    .settle-person b { display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .settle-person span { color: var(--muted); font-size: 12px; }
    .settle-arrow {
      color: var(--accent);
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .balance-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 4px;
      margin-bottom: 8px;
      border-radius: var(--radius);
      background: #DCDCD8;
      padding: 14px;
    }
    .balance-row:last-child { margin-bottom: 0; }
    .balance-row b { display: block; font-size: 15px; }
    .balance-row span { color: var(--muted); font-size: 12px; }

    .bottom-action {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(760px, 100%);
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
      background: rgba(244, 244, 242, .94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 0;
      z-index: 50;
      box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.08);
    }
    .bottom-action .btn { width: 100%; }
    #view-detail .bottom-action {
      pointer-events: none;
      background: transparent;
      border-top: 0;
      box-shadow: none;
    }
    .fab {
      pointer-events: auto;
      position: fixed;
      right: max(18px, calc((100vw - 760px) / 2 + 18px));
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 0;
      background: #e8792f;
      color: #fff;
      font-size: 36px;
      line-height: 1;
      font-weight: 400;
      font-family: Arial, sans-serif;
      box-shadow: 0 14px 34px rgba(232, 121, 47, .32);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .fab:active { transform: translateY(1px) scale(.98); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(17,17,17,.36);
      backdrop-filter: blur(8px);
      visibility: hidden;
      opacity: 0;
      transition: 0.25s ease;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .sheet {
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      border-radius: var(--radius) var(--radius) 0 0;
      background: #EDEDEA;
      border: 0;
      transform: translateY(100%);
      transition: 0.25s ease;
    }
    .modal.active .sheet { transform: translateY(0); }
    .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .sheet-head h2 { margin: 0; font-size: 20px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 7px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .control {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: #DCDCD8;
      min-height: 48px;
      padding: 12px 14px;
      color: var(--ink);
      outline: none;
    }
    .control:focus { background: #F4F4F2; box-shadow: none; }
    textarea.control { resize: vertical; min-height: 76px; }

    .check-grid {
      display: grid;
      gap: 8px;
    }
    .check-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border: 0;
      border-radius: var(--radius);
      background: #DCDCD8;
    }
    .check-item input { width: 20px; height: 20px; accent-color: var(--accent); }

    .expense-flow .sheet {
      max-height: 92vh;
      min-height: 0;
      display: block;
      transition: height .28s ease, max-height .28s ease, transform .25s ease;
    }
    .expense-flow .section-title {
      font-weight: 600;
    }
    .expense-step {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transform: translateY(10px);
      transition: max-height .28s ease, opacity .2s ease, transform .24s ease;
    }
    .expense-step.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 760px;
      opacity: 1;
      overflow: hidden;
      pointer-events: auto;
      transform: translateY(0);
    }
    .amount-step.active {
      justify-content: flex-start;
      padding-top: 0;
    }
    .split-step.active {
      justify-content: flex-start;
    }
    #split-choices {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }
    #split-choices .choice-card {
      min-height: 46px;
    }
    .calc-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      gap: 8px;
      align-items: center;
    }
    .calc-display {
      min-height: 68px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #DCDCD8;
      border: 0;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      font-size: clamp(30px, 9vw, 42px);
      font-weight: 500;
      overflow: hidden;
      white-space: nowrap;
    }
    .calc-back {
      min-height: 68px;
      border: 0;
      border-radius: var(--radius);
      background: #D4D4D0;
      color: var(--ink);
      font-size: 19px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(17, 17, 17, .085);
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px;
      background: #E6E6E2;
      border: 0;
      border-radius: 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .68);
    }
    .calc-key {
      min-height: 50px;
      border: 0;
      border-radius: 16px;
      background: #F8F8F6;
      color: var(--ink);
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(17, 17, 17, .075);
    }
    .calc-key:hover { background: #fff; }
    .calc-key.op {
      background: #A8B9CC;
      color: #111;
      box-shadow: 0 7px 16px rgba(168, 185, 204, .24);
    }
    .calc-key.primary { background: #111; color: #fff; }
    .calc-key.wide { grid-column: span 2; }
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .choice-card {
      border: 0;
      border-radius: var(--radius);
      background: #DCDCD8;
      min-height: 48px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
    }
    .choice-card.active {
      background: #e8c7ad;
      box-shadow: none;
    }
    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      border: 0;
      border-radius: var(--radius);
      background: #D6D6D2;
    }
    .mode-switch button {
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 500;
    }
    .mode-switch button.active {
      background: var(--paper);
      color: var(--ink);
    }
    .share-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 0;
      border-radius: var(--radius);
      background: #DCDCD8;
    }
    .share-row button {
      border: 0;
      border-radius: var(--radius);
      background: #F4F4F2;
      min-width: 104px;
      min-height: 40px;
      font-weight: 500;
      color: var(--ink);
    }
    .share-row.active button {
      background: #ead9ca;
    }
    .split-panel {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-6px);
      transition: max-height .28s ease, opacity .2s ease, transform .24s ease;
      background: #D6D6D2;
      border-radius: var(--radius);
      padding: 0 10px;
    }
    .split-panel.show {
      max-height: 620px;
      opacity: 1;
      transform: translateY(0);
      padding: 10px;
    }
    .flow-actions {
      margin-top: 2px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding-top: 6px;
    }
    .flow-note {
      margin: -4px 2px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="view-list" class="view active">
    <div class="topbar">
      <h1 class="title">輕便分帳</h1>
      <button id="btn-login" class="btn" style="min-height:40px; padding:8px 14px;" onclick="loginGoogle()">Google 登入</button>
      <img id="user-avatar" src="" class="avatar hidden" style="width:38px;height:38px;cursor:pointer;box-shadow:var(--shadow);" onclick="logout()" title="登出">
    </div>

    <section class="hero">
      <p class="hero-label">快速分帳</p>
      <h2 class="hero-amount">分帳</h2>
    </section>

    <div id="login-prompt" class="empty" style="margin-top:18px;">
      <h3>請先登入</h3>
    </div>

    <div id="group-list-wrap" class="hidden">
      <p class="section-title">我的分帳群組</p>
      <div id="group-list"></div>
    </div>

    <div class="bottom-action">
      <button id="btn-create-group" class="btn" onclick="openModal('modal-group')" disabled>新增群組</button>
    </div>
  </div>

  <div id="view-detail" class="view">
    <div class="topbar">
      <button class="icon-btn" onclick="goList()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </button>
      <h1 class="title" id="detail-title">明細</h1>
      <button class="icon-btn" onclick="shareGroup()" title="邀請朋友">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.59 10.49 15.41 6.51M8.59 13.51 15.42 17.49"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <p class="hero-label">總計</p>
      <h2 class="hero-amount" id="total-amount">NT$0</h2>
      <p class="hero-sub" id="group-subtitle">0 位成員 · 0 筆支出</p>
      <div class="summary-grid">
        <div class="summary-card"><span>我先付</span><strong id="my-paid">$0</strong></div>
        <div class="summary-card"><span>差額</span><strong id="my-balance">$0</strong></div>
      </div>
    </section>

    <p class="section-title">成員</p>
    <div id="member-strip" class="member-strip"></div>

    <div class="tabs">
      <button id="tab-expenses" class="tab active" onclick="setTab('expenses')">支出</button>
      <button id="tab-settle" class="tab" onclick="setTab('settle')">結算</button>
    </div>

    <div id="panel-expenses">
      <div id="expense-list"></div>
    </div>
    <div id="panel-settle" class="hidden">
      <div id="settle-list"></div>
      <p class="section-title">每人狀態</p>
      <div id="balance-list" class="group-card" style="display:block; cursor:default;"></div>
    </div>

    <div class="bottom-action">
      <button class="fab" onclick="openExpenseModal()" aria-label="新增支出">+</button>
    </div>
  </div>

  <div class="modal" id="modal-group">
    <div class="sheet">
      <div class="sheet-head">
        <h2>新增群組</h2>
        <button class="icon-btn" onclick="closeModal('modal-group')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="field">
        <label for="group-title">名稱</label>
        <input id="group-title" class="control" placeholder="例如：東京五日分帳">
      </div>
      <div class="field">
        <label for="group-currency">幣別</label>
        <select id="group-currency" class="control">
          <option value="NT$">TWD 台幣</option>
          <option value="¥">JPY 日圓</option>
          <option value="US$">USD 美金</option>
          <option value="€">EUR 歐元</option>
          <option value="HK$">HKD 港幣</option>
          <option value="₩">KRW 韓元</option>
          <option value="฿">THB 泰銖</option>
          <option value="S$">SGD 新加坡幣</option>
          <option value="£">GBP 英鎊</option>
          <option value="A$">AUD 澳幣</option>
        </select>
      </div>
      <button id="btn-save-group" type="button" class="btn" style="width:100%;" onclick="saveGroup()">完成</button>
    </div>
  </div>

  <div class="modal expense-flow" id="modal-expense">
    <div class="sheet">
      <div class="sheet-head">
        <h2 id="expense-modal-title">新增</h2>
        <button class="icon-btn" onclick="cancelExpenseFlow()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="expense-step-amount" class="expense-step amount-step active">
        <div>
          <p class="section-title" style="margin: 0 2px 10px;">誰出錢</p>
          <div class="choice-grid" id="payer-choices"></div>
        </div>
        <div class="calc-control">
          <div class="calc-display" id="calc-display">0</div>
          <button type="button" class="calc-back" onclick="pressCalc('total', '⌫')" aria-label="刪除">⌫</button>
        </div>
        <div class="calc-grid" id="main-calc"></div>
        <div class="flow-actions">
          <button id="btn-expense-next" class="btn" onclick="goExpenseStep2()" disabled>下一步</button>
        </div>
      </div>

      <div id="expense-step-split" class="expense-step split-step">
        <div class="mode-switch">
          <button id="btn-mode-equal" class="active" onclick="setSplitMode('equal')">為誰付錢</button>
          <button id="btn-mode-custom" onclick="setSplitMode('custom')">項目分錢</button>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label for="expense-title-input">這是什麼東西花的錢</label>
          <input id="expense-title-input" class="control" placeholder="例如：晚餐、車票、住宿" oninput="setExpenseTitle(this.value)">
        </div>
        <div>
          <p class="section-title" style="margin: 4px 2px 10px;">分給誰</p>
          <div class="choice-grid" id="split-choices"></div>
        </div>
        <div id="custom-split-panel" class="split-panel">
          <p class="flow-note" id="custom-remaining">剩餘 0</p>
          <div class="check-grid" id="share-list"></div>
          <div class="calc-control">
            <div class="calc-display" id="share-calc-display">0</div>
            <button type="button" class="calc-back" onclick="pressCalc('share', '⌫')" aria-label="刪除">⌫</button>
          </div>
          <div class="calc-grid" id="share-calc"></div>
        </div>
        <div class="flow-actions">
          <button id="btn-save-expense" class="btn" onclick="saveExpense()" disabled>完成</button>
          <button class="btn secondary" onclick="goExpenseStep1()">上一步</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let groups = [];
    let currentGroupId = null;
    let currentGroup = null;
    let groupUnsubscribe = null;
    let activeTab = 'expenses';
    let expenseDraft = null;
    let calcTarget = 'total';
    let lastTouchEnd = 0;

    const firebaseConfig = {
      apiKey: "AIzaSyDb8pnjqIZEOwIqAvYp4okzE9z7czZMR9o",
      authDomain: "mytripapp-50159.firebaseapp.com",
      projectId: "mytripapp-50159",
      storageBucket: "mytripapp-50159.firebasestorage.app",
      messagingSenderId: "165889240432",
      appId: "1:165889240432:web:f2e42d74126283500c73b5",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    db.enablePersistence().catch(err => console.warn("離線模式未啟用", err));

    const icons = {
      trash: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>'
    };

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return escapeHTML(value).replaceAll("`", "&#96;");
    }

    function jsArg(value) {
      return escapeAttr(JSON.stringify(String(value ?? "")));
    }

    function userProfile(user) {
      return {
        name: user.displayName || user.email || '未命名',
        photoURL: user.photoURL || '',
        email: user.email || ''
      };
    }

    function getMembers(group = currentGroup) {
      if (!group) return [];
      const profiles = group.memberProfiles || {};
      return (group.members || []).map(uid => ({
        uid,
        name: profiles[uid]?.name || '成員',
        photoURL: profiles[uid]?.photoURL || ''
      }));
    }

    function getExpenses(group = currentGroup) {
      return Object.values(group?.expenses || {}).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }

    function money(value, group = currentGroup) {
      const symbol = group?.currency || 'NT$';
      const amount = Number(value || 0);
      return symbol + amount.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
    }

    function memberName(uid, group = currentGroup) {
      return group?.memberProfiles?.[uid]?.name || '成員';
    }

    function initials(name) {
      return String(name || '?').trim().slice(0, 1).toUpperCase();
    }

    function avatarHtml(member) {
      const name = escapeAttr(member.name);
      return member.photoURL
        ? `<img class="avatar" src="${escapeAttr(member.photoURL)}" alt="${name}">`
        : `<span class="avatar">${escapeHTML(initials(member.name))}</span>`;
    }

    function calculate(group = currentGroup) {
      const members = getMembers(group);
      const balances = {};
      members.forEach(member => {
        balances[member.uid] = { uid: member.uid, paid: 0, share: 0, net: 0 };
      });

      const expenses = getExpenses(group);
      expenses.forEach(expense => {
        const amount = Number(expense.amount || 0);
        const splitWith = (expense.splitWith || []).filter(uid => balances[uid]);
        if (!amount || !balances[expense.paidBy] || splitWith.length === 0) return;

        balances[expense.paidBy].paid += amount;
        if (expense.shares && typeof expense.shares === 'object') {
          splitWith.forEach(uid => {
            balances[uid].share += Number(expense.shares[uid] || 0);
          });
        } else {
          const share = amount / splitWith.length;
          splitWith.forEach(uid => {
            balances[uid].share += share;
          });
        }
      });

      Object.values(balances).forEach(balance => {
        balance.net = balance.paid - balance.share;
      });

      const creditors = Object.values(balances)
        .filter(b => b.net > 0.01)
        .sort((a, b) => b.net - a.net);
      const debtors = Object.values(balances)
        .filter(b => b.net < -0.01)
        .sort((a, b) => a.net - b.net);

      const transfers = [];
      let i = 0;
      let j = 0;
      while (i < debtors.length && j < creditors.length) {
        const debtor = debtors[i];
        const creditor = creditors[j];
        const amount = Math.min(-debtor.net, creditor.net);
        if (amount > 0.01) {
          transfers.push({ from: debtor.uid, to: creditor.uid, amount });
          debtor.net += amount;
          creditor.net -= amount;
        }
        if (Math.abs(debtor.net) < 0.01) i++;
        if (Math.abs(creditor.net) < 0.01) j++;
      }

      const total = expenses.reduce((sum, expense) => sum + Number(expense.amount || 0), 0);
      return { balances, transfers, total, expenseCount: expenses.length };
    }

    auth.onAuthStateChanged(async user => {
      currentUser = user;
      const btnLogin = document.getElementById('btn-login');
      const avatar = document.getElementById('user-avatar');
      const prompt = document.getElementById('login-prompt');
      const groupWrap = document.getElementById('group-list-wrap');
      const createBtn = document.getElementById('btn-create-group');

      if (!user) {
        btnLogin.classList.remove('hidden');
        avatar.classList.add('hidden');
        prompt.classList.remove('hidden');
        groupWrap.classList.add('hidden');
        createBtn.disabled = true;
        groups = [];
        renderGroups();
        goList();
        if (groupUnsubscribe) groupUnsubscribe();
        return;
      }

      btnLogin.classList.add('hidden');
      avatar.classList.remove('hidden');
      avatar.src = user.photoURL || '';
      prompt.classList.add('hidden');
      groupWrap.classList.remove('hidden');
      createBtn.disabled = false;

      const inviteId = new URLSearchParams(window.location.search).get('split');
      if (inviteId) {
        await joinGroup(inviteId, true);
      }

      listenGroups();
    });

    function listenGroups() {
      if (groupUnsubscribe) groupUnsubscribe();
      groupUnsubscribe = db.collection('splitGroups')
        .where('members', 'array-contains', currentUser.uid)
        .onSnapshot(snapshot => {
          groups = [];
          snapshot.forEach(doc => groups.push({ id: doc.id, ...doc.data() }));
          groups.sort((a, b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
          renderGroups();
          if (currentGroupId) {
            currentGroup = groups.find(group => group.id === currentGroupId) || null;
            if (currentGroup) renderDetail();
          }
        }, err => {
          console.error(err);
          alert(firestoreErrorMessage(err));
        });
    }

    async function joinGroup(groupId, fromInvite = false) {
      if (!currentUser) return;
      try {
        await db.collection('splitGroups').doc(groupId).update({
          members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
          [`memberProfiles.${currentUser.uid}`]: userProfile(currentUser),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (fromInvite) {
          window.history.replaceState({}, document.title, window.location.pathname);
          currentGroupId = groupId;
        }
      } catch (err) {
        console.error(err);
        alert('加入分帳群組失敗，可能是連結無效或權限不足。');
      }
    }

    function loginGoogle() {
      auth.signInWithPopup(provider).catch(err => alert('登入失敗: ' + err.message));
    }

    function logout() {
      if (confirm('確定要登出嗎？')) auth.signOut();
    }

    function renderGroups() {
      const container = document.getElementById('group-list');
      container.innerHTML = '';
      if (!currentUser) return;
      if (groups.length === 0) {
        container.innerHTML = '<div class="empty"><h3>沒有群組</h3></div>';
        return;
      }

      groups.forEach((group, index) => {
        const summary = calculate(group);
        const memberCount = (group.members || []).length;
        container.innerHTML += `
          <div class="group-card" style="animation-delay:${index * 0.04}s" onclick="selectGroup(${jsArg(group.id)})">
            <div class="group-dot">${escapeHTML(initials(group.title))}</div>
            <div class="group-main">
              <h3>${escapeHTML(group.title || '未命名分帳')}</h3>
              <p>${memberCount} 位成員 · ${summary.expenseCount} 筆支出 · ${money(summary.total, group)}</p>
            </div>
          </div>`;
      });
    }

    function selectGroup(id) {
      currentGroupId = id;
      currentGroup = groups.find(group => group.id === id) || null;
      if (!currentGroup) return;
      document.getElementById('view-list').classList.remove('active');
      document.getElementById('view-detail').classList.add('active');
      renderDetail();
    }

    function goList() {
      currentGroupId = null;
      currentGroup = null;
      document.getElementById('view-detail').classList.remove('active');
      document.getElementById('view-list').classList.add('active');
    }

    function setTab(tab) {
      activeTab = tab;
      document.getElementById('tab-expenses').classList.toggle('active', tab === 'expenses');
      document.getElementById('tab-settle').classList.toggle('active', tab === 'settle');
      document.getElementById('panel-expenses').classList.toggle('hidden', tab !== 'expenses');
      document.getElementById('panel-settle').classList.toggle('hidden', tab !== 'settle');
    }

    function renderDetail() {
      if (!currentGroup) return;
      const members = getMembers();
      const expenses = getExpenses();
      const summary = calculate();
      const my = summary.balances[currentUser.uid] || { paid: 0, net: 0 };

      document.getElementById('detail-title').innerText = currentGroup.title || '分帳明細';
      document.getElementById('total-amount').innerText = money(summary.total);
      document.getElementById('group-subtitle').innerText = `${members.length} 位成員 · ${expenses.length} 筆支出`;
      document.getElementById('my-paid').innerText = money(my.paid);

      const balanceEl = document.getElementById('my-balance');
      balanceEl.innerText = money(Math.abs(my.net));
      balanceEl.classList.toggle('positive', my.net > 0.01);
      balanceEl.classList.toggle('negative', my.net < -0.01);
      if (Math.abs(my.net) < 0.01) balanceEl.innerText = money(0);

      document.getElementById('member-strip').innerHTML = members.map(member => `
        <span class="chip">${avatarHtml(member)}${escapeHTML(member.name)}</span>
      `).join('');

      renderExpenses(expenses);
      renderSettlement(summary);
      setTab(activeTab);
    }

    function renderExpenses(expenses) {
      const container = document.getElementById('expense-list');
      if (expenses.length === 0) {
        container.innerHTML = '<div class="empty"><h3>沒有支出</h3></div>';
        return;
      }

      container.innerHTML = expenses.map((expense, index) => {
        const splitNames = (expense.splitWith || []).map(uid => memberName(uid)).join('、');
        return `
          <div class="expense-card" style="animation-delay:${index * 0.035}s" onclick="editExpense(${jsArg(expense.id)})">
            <div>
              <h3>${escapeHTML(expense.title || '未命名支出')}</h3>
              <p>${escapeHTML(memberName(expense.paidBy))} 先付 · 分給 ${escapeHTML(splitNames || '無人')}</p>
              ${expense.note ? `<p>${escapeHTML(expense.note)}</p>` : ''}
            </div>
            <div>
              <div class="expense-amount">${money(expense.amount)}</div>
              <button class="delete-mini" onclick="event.stopPropagation(); deleteExpense(${jsArg(expense.id)})" title="刪除">${icons.trash}</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderSettlement(summary) {
      const settle = document.getElementById('settle-list');
      if (summary.transfers.length === 0) {
        settle.innerHTML = '<div class="empty"><h3>目前已打平</h3><p>大家付的金額和應分攤金額已經平衡，不需要轉帳。</p></div>';
      } else {
        settle.innerHTML = summary.transfers.map(item => `
          <div class="settle-card">
            <div class="settle-person"><b>${escapeHTML(memberName(item.from))}</b><span>轉出</span></div>
            <div class="settle-arrow">給<br>${money(item.amount)}</div>
            <div class="settle-person" style="text-align:right;"><b>${escapeHTML(memberName(item.to))}</b><span>收款</span></div>
          </div>
        `).join('');
      }

      const balances = Object.values(summary.balances || {});
      document.getElementById('balance-list').innerHTML = balances.map(balance => {
        const net = balance.paid - balance.share;
        const label = net > 0.01 ? '應收' : net < -0.01 ? '應付' : '已平衡';
        const cls = net > 0.01 ? 'positive' : net < -0.01 ? 'negative' : '';
        return `
          <div class="balance-row">
            <div><b>${escapeHTML(memberName(balance.uid))}</b><span>已付 ${money(balance.paid)} · 應分攤 ${money(balance.share)}</span></div>
            <strong class="${cls}">${label} ${money(Math.abs(net))}</strong>
          </div>`;
      }).join('');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      if (!document.querySelector('.modal.active')) document.body.classList.remove('modal-open');
    }

    function firestoreErrorMessage(err) {
      if (err?.code === 'permission-denied') {
        return '儲存失敗：Firestore 規則還沒允許 splitGroups。';
      }
      return `儲存失敗：${err?.message || '請稍後再試'}`;
    }

    async function saveGroup() {
      if (!currentUser) return alert('請先登入');
      const btn = document.getElementById('btn-save-group');
      const title = document.getElementById('group-title').value.trim();
      const currency = document.getElementById('group-currency').value.trim() || 'NT$';
      if (!title) return alert('請輸入群組名稱');

      const id = `sg_${Date.now()}`;
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = '建立中';
        }

        await db.collection('splitGroups').doc(id).set({
          title,
          currency,
          members: [currentUser.uid],
          memberProfiles: { [currentUser.uid]: userProfile(currentUser) },
          expenses: {},
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('group-title').value = '';
        document.getElementById('group-currency').value = 'NT$';
        closeModal('modal-group');
        currentGroupId = id;
        currentGroup = {
          id,
          title,
          currency,
          members: [currentUser.uid],
          memberProfiles: { [currentUser.uid]: userProfile(currentUser) },
          expenses: {}
        };
        document.getElementById('view-list').classList.remove('active');
        document.getElementById('view-detail').classList.add('active');
        renderDetail();
      } catch (err) {
        console.error(err);
        alert(firestoreErrorMessage(err));
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = '完成';
        }
      }
    }

    function openExpenseModal(expense = null) {
      if (!currentGroup) return;
      const members = getMembers();
      const amount = Number(expense?.amount || 0);
      const selected = expense?.splitWith?.length ? expense.splitWith.filter(uid => members.some(m => m.uid === uid)) : members.map(member => member.uid);

      expenseDraft = {
        id: expense?.id || null,
        title: expense?.title || '',
        amountText: amount ? formatCalcNumber(amount) : '',
        expression: amount ? formatCalcNumber(amount) : '',
        amount,
        paidBy: expense?.paidBy || currentUser.uid,
        splitMode: expense?.shares ? 'custom' : 'equal',
        splitWith: selected,
        shares: expense?.shares ? { ...expense.shares } : {},
        activeShareUid: selected[0] || members[0]?.uid || '',
        createdAt: expense?.createdAt || Date.now(),
        note: expense?.note || ''
      };

      calcTarget = 'total';
      document.getElementById('expense-modal-title').innerText = expense ? '修改' : '新增';
      renderCalculator('main-calc', 'total');
      renderCalculator('share-calc', 'share');
      renderExpenseFlow();
      goExpenseStep1();
      openModal('modal-expense');
    }

    function editExpense(id) {
      const expense = currentGroup?.expenses?.[id];
      if (expense) openExpenseModal(expense);
    }

    function cancelExpenseFlow() {
      expenseDraft = null;
      closeModal('modal-expense');
    }

    function goExpenseStep1() {
      document.getElementById('expense-step-amount').classList.add('active');
      document.getElementById('expense-step-split').classList.remove('active');
      calcTarget = 'total';
      renderExpenseFlow();
    }

    function goExpenseStep2() {
      if (!canGoStep2()) return;
      document.getElementById('expense-step-amount').classList.remove('active');
      document.getElementById('expense-step-split').classList.add('active');
      if (expenseDraft.splitMode === 'custom' && !expenseDraft.activeShareUid) {
        expenseDraft.activeShareUid = expenseDraft.splitWith[0] || '';
      }
      calcTarget = expenseDraft.activeShareUid || 'share';
      renderExpenseFlow();
    }

    function formatCalcNumber(value) {
      const num = Number(value || 0);
      return Number.isInteger(num) ? String(num) : String(Math.round(num * 100) / 100);
    }

    function evalExpression(raw) {
      const expr = String(raw || '').replaceAll('×', '*').replaceAll('÷', '/');
      if (!expr || !/^[0-9+\-*/.() ]+$/.test(expr)) return 0;
      try {
        const value = Function(`"use strict"; return (${expr})`)();
        return Number.isFinite(value) && value > 0 ? Math.round(value * 100) / 100 : 0;
      } catch {
        return 0;
      }
    }

    function renderCalculator(containerId, targetType) {
      const keys = ['7', '8', '9', '÷', '4', '5', '6', '×', '1', '2', '3', '-', '0', '00', '.', '+', 'C', '='];
      document.getElementById(containerId).innerHTML = keys.map(key => {
        const cls = ['÷', '×', '-', '+'].includes(key) ? 'calc-key op' : 'calc-key';
        const primary = key === '=' ? ' primary' : '';
        const wide = ['C', '='].includes(key) ? ' wide' : '';
        return `<button type="button" class="${cls}${primary}${wide}" onclick="pressCalc(${jsArg(targetType)}, ${jsArg(key)})">${escapeHTML(key)}</button>`;
      }).join('');
    }

    function pressCalc(targetType, key) {
      if (!expenseDraft) return;
      if (targetType === 'total') {
        expenseDraft.expression = nextExpression(expenseDraft.expression, key);
        expenseDraft.amount = evalExpression(expenseDraft.expression);
        expenseDraft.amountText = expenseDraft.expression;
        if (expenseDraft.splitMode === 'custom') normalizeShares();
      } else {
        const uid = expenseDraft.activeShareUid;
        if (!uid) return;
        const current = expenseDraft.shareExpressions?.[uid] ?? formatCalcNumber(expenseDraft.shares[uid] || 0);
        const next = nextExpression(current, key);
        expenseDraft.shareExpressions = expenseDraft.shareExpressions || {};
        expenseDraft.shareExpressions[uid] = next;
        expenseDraft.shares[uid] = evalExpression(next);
        autoFillRemainder(uid);
      }
      renderExpenseFlow();
    }

    function nextExpression(current, key) {
      let value = String(current || '');
      if (key === 'C') return '';
      if (key === '⌫') return value.slice(0, -1);
      if (key === 'OK' || key === '=') return formatCalcNumber(evalExpression(value));
      if (key === '.' && /(^|[+\-*/×÷])[^+\-*/×÷]*\.$/.test(value)) return value;
      if (['+', '-', '×', '÷'].includes(key) && (!value || /[+\-×÷]$/.test(value))) return value;
      return value + key;
    }

    function setPayer(uid) {
      if (!expenseDraft) return;
      expenseDraft.paidBy = uid;
      renderExpenseFlow();
    }

    function setExpenseTitle(value) {
      if (!expenseDraft) return;
      expenseDraft.title = value;
      document.getElementById('btn-save-expense').disabled = !canSaveExpenseDraft();
    }

    function toggleSplitMember(uid) {
      if (!expenseDraft) return;
      const set = new Set(expenseDraft.splitWith);
      if (set.has(uid)) {
        if (set.size <= 1) return;
        set.delete(uid);
        delete expenseDraft.shares[uid];
      } else {
        set.add(uid);
      }
      expenseDraft.splitWith = Array.from(set);
      if (!expenseDraft.splitWith.includes(expenseDraft.activeShareUid)) {
        expenseDraft.activeShareUid = expenseDraft.splitWith[0] || '';
      }
      normalizeShares();
      renderExpenseFlow();
    }

    function setSplitMode(mode) {
      if (!expenseDraft) return;
      expenseDraft.splitMode = mode;
      if (mode === 'custom') normalizeShares();
      renderExpenseFlow();
    }

    function setActiveShare(uid) {
      if (!expenseDraft) return;
      expenseDraft.activeShareUid = uid;
      calcTarget = uid;
      renderExpenseFlow();
    }

    function normalizeShares() {
      if (!expenseDraft) return;
      expenseDraft.splitWith.forEach(uid => {
        if (expenseDraft.shares[uid] == null) expenseDraft.shares[uid] = 0;
      });
      Object.keys(expenseDraft.shares).forEach(uid => {
        if (!expenseDraft.splitWith.includes(uid)) delete expenseDraft.shares[uid];
      });
    }

    function autoFillRemainder(changedUid) {
      const selected = expenseDraft.splitWith;
      if (selected.length !== 2) return;
      const other = selected.find(uid => uid !== changedUid);
      if (!other) return;
      const remaining = Math.max(0, Math.round((expenseDraft.amount - Number(expenseDraft.shares[changedUid] || 0)) * 100) / 100);
      expenseDraft.shares[other] = remaining;
      expenseDraft.shareExpressions = expenseDraft.shareExpressions || {};
      expenseDraft.shareExpressions[other] = formatCalcNumber(remaining);
    }

    function canGoStep2() {
      return !!expenseDraft && expenseDraft.amount > 0 && !!expenseDraft.paidBy;
    }

    function canSaveExpenseDraft() {
      if (!canGoStep2() || expenseDraft.splitWith.length === 0 || !String(expenseDraft.title || '').trim()) return false;
      if (expenseDraft.splitMode === 'equal') return true;
      const totalShare = expenseDraft.splitWith.reduce((sum, uid) => sum + Number(expenseDraft.shares[uid] || 0), 0);
      return Math.abs(totalShare - expenseDraft.amount) < 0.01;
    }

    function renderExpenseFlow() {
      if (!expenseDraft) return;
      const members = getMembers();
      document.getElementById('calc-display').innerText = expenseDraft.expression || '0';
      document.getElementById('payer-choices').innerHTML = members.map(member => `
        <button type="button" class="choice-card ${expenseDraft.paidBy === member.uid ? 'active' : ''}" onclick="setPayer(${jsArg(member.uid)})">
          ${avatarHtml(member)}<span>${escapeHTML(member.name)}</span>
        </button>
      `).join('');

      document.getElementById('split-choices').innerHTML = members.map(member => `
        <button type="button" class="choice-card ${expenseDraft.splitWith.includes(member.uid) ? 'active' : ''}" onclick="toggleSplitMember(${jsArg(member.uid)})">
          ${avatarHtml(member)}<span>${escapeHTML(member.name)}</span>
        </button>
      `).join('');

      document.getElementById('btn-mode-equal').classList.toggle('active', expenseDraft.splitMode === 'equal');
      document.getElementById('btn-mode-custom').classList.toggle('active', expenseDraft.splitMode === 'custom');
      const titleInput = document.getElementById('expense-title-input');
      if (titleInput && titleInput.value !== expenseDraft.title) titleInput.value = expenseDraft.title || '';
      document.getElementById('custom-split-panel').classList.toggle('show', expenseDraft.splitMode === 'custom');
      document.getElementById('btn-expense-next').disabled = !canGoStep2();
      document.getElementById('btn-save-expense').disabled = !canSaveExpenseDraft();

      renderShareList();
    }

    function renderShareList() {
      if (!expenseDraft) return;
      normalizeShares();
      const selected = getMembers().filter(member => expenseDraft.splitWith.includes(member.uid));
      const totalShare = selected.reduce((sum, member) => sum + Number(expenseDraft.shares[member.uid] || 0), 0);
      const remaining = Math.round((expenseDraft.amount - totalShare) * 100) / 100;
      document.getElementById('custom-remaining').innerText = `剩餘 ${money(Math.max(0, remaining))}`;
      document.getElementById('share-list').innerHTML = selected.map(member => `
        <div class="share-row ${expenseDraft.activeShareUid === member.uid ? 'active' : ''}">
          <div>${avatarHtml(member)} <b>${escapeHTML(member.name)}</b></div>
          <button type="button" onclick="setActiveShare(${jsArg(member.uid)})">${money(expenseDraft.shares[member.uid] || 0)}</button>
        </div>
      `).join('');
      const active = expenseDraft.activeShareUid;
      const activeText = expenseDraft.shareExpressions?.[active] ?? formatCalcNumber(expenseDraft.shares[active] || 0);
      document.getElementById('share-calc-display').innerText = activeText || '0';
    }

    async function saveExpense() {
      if (!currentGroup || !currentUser || !canSaveExpenseDraft()) return;
      const id = expenseDraft.id || `ex_${Date.now()}`;
      const amount = Math.round(expenseDraft.amount * 100) / 100;
      const splitWith = expenseDraft.splitWith.slice();
      const expense = {
        id,
        title: String(expenseDraft.title || '').trim(),
        amount,
        paidBy: expenseDraft.paidBy,
        splitWith,
        note: expenseDraft.note || '',
        createdBy: currentUser.uid,
        createdAt: expenseDraft.createdAt || Date.now(),
        updatedAt: Date.now()
      };
      if (expenseDraft.splitMode === 'custom') {
        expense.shares = {};
        splitWith.forEach(uid => expense.shares[uid] = Math.round(Number(expenseDraft.shares[uid] || 0) * 100) / 100);
      }

      await db.collection('splitGroups').doc(currentGroupId).update({
        [`expenses.${id}`]: expense,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      expenseDraft = null;
      closeModal('modal-expense');
    }

    async function deleteExpense(id) {
      if (!currentGroup || !id) return;
      if (!confirm('確定刪除此筆支出？')) return;
      await db.collection('splitGroups').doc(currentGroupId).update({
        [`expenses.${id}`]: firebase.firestore.FieldValue.delete(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    function shareGroup() {
      if (!currentGroupId) return;
      const url = `${window.location.origin}${window.location.pathname}?split=${encodeURIComponent(currentGroupId)}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('已複製邀請連結，朋友打開並登入後就能加入分帳。');
      }).catch(() => {
        prompt('請複製邀請連結：', url);
      });
    }

    document.addEventListener('dblclick', event => event.preventDefault(), { passive: false });
    document.addEventListener('touchend', event => {
      const now = Date.now();
      if (now - lastTouchEnd <= 320 && !event.target.closest('button, input, textarea, select')) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed: ', err));
      });
    }
  </script>
</body>
</html>
